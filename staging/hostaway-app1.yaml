apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hostaway-app1
spec:
  project: argocd
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: nginx
      targetRevision: 21.1.1
      helm:
        valueFiles:
          - "$values/values.yaml"
    - repoURL: git@github.com:g00ntar/hostaway-app1.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: staging